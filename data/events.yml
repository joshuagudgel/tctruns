    # === DISTANCE/PRICING DETAILS ===
    distances:
      - distance: "5K"
        early_bird_price: 25
        regular_price: 35
        race_day_price: 45
        description: "Flat, fast course perfect for PRs and beginners"

    # === EVENT LOGISTICS ===
    time: "07:00 AM"
    contact_email: "spring5k@tctruns.com"
    awards: "Overall male/female winners, top 3 in each age group (under 18, 18-29, 30-39, 40-49, 50-59, 60+)"
    packet_pickup: "Friday April 14th 5-7 PM at Fleet Feet Sports, Race day 6:30-7:45 AM at event site"
