    photos_url: ""
    sponsors: ["Fleet Feet Sports", "Riverside Medical Center", "Local Bank"]

    # === DETAILED TEXT SECTIONS ===
    details:
      about_race: |
        Join us for our signature spring race through the beautiful Riverside Park. Perfect for runners of all levels with a flat, fast course that's ideal for setting personal records or completing your first 5K.

        This race marks the beginning of our racing season and attracts runners from across the region for its scenic route and welcoming atmosphere.

      trail_notes: |
        **Course Details:**
        - Certified 5K distance (3.1 miles)
        - Flat, paved surface throughout
        - Single loop course starting and ending at Riverside Park
        - Mile markers at 1, 2, and 3.1
        - Water station at mile 1.5

        **Surface:** 100% paved park roads
        **Elevation:** Minimal elevation change, net flat
        **Timing:** ChronoTrack chip timing for accurate results

      registration_notes: |
        **Registration Information:**
        - Early bird pricing through March 31st
        - Online registration closes April 13th at midnight
        - Race day registration available starting 6:30 AM
        - All participants receive a finisher medal

        **Packet Pickup:**
        - Advance pickup recommended to avoid race morning lines
        - Packet pickup includes bib, timing chip, and race t-shirt (if ordered)

      directions_notes: |
        **Event Location:** Riverside Park, 456 River Drive, Downtown

        **Parking:** 
        - Primary: Riverside Park parking lot (100 spaces)
        - Overflow: City Hall parking (2 blocks away, free on weekends)
        - Street parking available on River Drive (arrive early)

        **From Highway:** Take Exit 15, follow signs to downtown, turn right on River Drive

  - name: "Summer Trail Series - Race 1"
