        race_day_price: 50
        description: "Challenging trail route with scenic mountain views"
      - distance: "5K"
        early_bird_price: 25
        regular_price: 35
        race_day_price: 45
        description: "Shorter option on the same beautiful trail system"

    # === EVENT LOGISTICS ===
    time: "08:00 AM"
    contact_email: "trails@tctruns.com"
    awards: "Overall winners, age group awards for both distances"
    packet_pickup: "Friday May 31st 5-7 PM at Running Store, Race day 7:00-7:45 AM at trailhead"
    parking: "Limited parking at trailhead. Shuttle service from overflow lot on Main Street"
    course_map_url: "https://tctruns.com/maps/trail-10k.pdf"
    results_url: ""
    photos_url: ""
    sponsors: ["Mountain Gear", "Trail Mix Cafe"]

    # === DETAILED TEXT SECTIONS ===
    details:
      about_race: |
        First race in our popular summer trail series. Challenging terrain with beautiful scenic views and two distance options to accommodate different fitness levels.

        This series celebrates trail running in our local mountains and builds community among outdoor enthusiasts.

      trail_notes: |
        **10K Course:**
        - Technical single-track trails with root and rock sections
        - 800ft elevation gain over rolling terrain
        - Creek crossing at mile 2.5 (may require wading in spring)
        - Spectacular overlook at mile 4

        **5K Course:**
        - First 2.5 miles of the 10K route then return
        - 400ft elevation gain, less technical sections
        - Creek crossing and return

        **Surface:** Natural trail surfaces, some rocky sections
        **Aid Stations:** Water and electrolytes at miles 2.5 and 5 (10K only)

      registration_notes: |
        **What to Expect:**
        - Trail running experience recommended for 10K
        - 5K suitable for hiking/trail beginners
        - All finishers receive a custom trail series medal
        - Technical t-shirts available for $15 add-on

        **Required Gear:**
        - Trail running shoes strongly recommended
        - Hydration pack or water bottles suggested
        - Weather-appropriate clothing (mountain weather changes quickly)

      support_crew_notes: |
        **Spectator Access:**
        - Start/Finish: Trailhead parking area
        - Mile 2.5: Creek crossing (accessible via fire road)
        - No vehicle access to overlook area

        **Crew Guidelines:**
        - Stay on marked trails only
        - Yield to runners on single-track sections
        - No littering - pack out all trash

      directions_notes: |
        **Trailhead Location:** Mountain View Trail System, Forest Service Road 142

        **Directions:**
        - From downtown: Take Highway 9 North for 15 miles
        - Turn right on Forest Service Road 142
        - Follow signs for 3 miles to trailhead parking

        **Parking:**
        - Trailhead lot: 50 spaces (arrive early)
        - Overflow shuttle from Main Street Park & Ride
        - Shuttle runs every 15 minutes starting at 6:30 AM

  - name: "Fall Half Marathon"
    date: "2026-10-12"
    location: "Historic Downtown Loop"

    # === CARD DISPLAY DATA ===
    primary_distance: "Half Marathon"
    registration_status: "coming-soon"
    registration_url: "https://register.tctruns.com/fall-half"
    featured: true

    # === DISTANCE/PRICING DETAILS ===
    distances:
      - distance: "Half Marathon"
        early_bird_price: 45
        regular_price: 60
        race_day_price: 70
        description: "13.1 mile scenic route through historic downtown"
      - distance: "10K"
        early_bird_price: 35
        regular_price: 45
        race_day_price: 55
        description: "Perfect training distance through historic district"
      - distance: "5K"
        early_bird_price: 25
        regular_price: 35
        race_day_price: 45
        description: "Family-friendly route with great city views"

    # === EVENT LOGISTICS ===
    time: "07:30 AM"
    contact_email: "fallhalf@tctruns.com"
    awards: "Marathon medals for all finishers, overall and age group awards, team competition"
    packet_pickup: "Friday Oct 11th 4-8 PM at Expo Center, Race day 6:00-7:15 AM at start line"
    parking: "Multiple downtown parking garages available. Early arrival recommended"
    course_map_url: ""
    results_url: ""
    photos_url: ""
    sponsors:
      [
        "Downtown Business Alliance",
        "Sports Medicine Clinic",
        "Healthy Eats Restaurant",
      ]

    # === DETAILED TEXT SECTIONS ===
    details:
      about_race: |
        Our premier fall event featuring three distance options through historic downtown. The half marathon course showcases the city's best architecture and landmarks, while the shorter distances offer perfect introduction to downtown racing.

        This race has been a community tradition for over 15 years, bringing together runners of all abilities to celebrate fitness and our beautiful historic city.

      trail_notes: |
        **Half Marathon Course:**
        - Miles 1-3: Historic district with heritage building tours
        - Miles 4-8: Riverfront greenway with scenic overlooks
        - Miles 9-13.1: Return through downtown with crowd support

        **10K Course:**
        - Historic district and riverfront portions
        - Finish at the same downtown location

        **5K Course:**
        - Best highlights of the downtown historic core
        - Family-friendly with minimal elevation

        **Surface:** 90% paved roads, 10% improved greenway trail
        **Elevation:** Rolling hills with 400ft total gain (half marathon)
        **Aid Stations:** Every 2 miles with water, sports drink, snacks

      registration_notes: |
        **Registration Information:**
        - Early bird pricing through August 31st
        - Online registration closes 48 hours before event
        - Race day registration available with $10 surcharge
        - Group discounts: 10+ people save 15%
        - Military/First responder discount: 20% off with valid ID

        **What's Included:**
        - Finisher medal for all distances (unique designs by distance)
        - Technical race t-shirt (optional $15 add-on)
        - Post-race food and beverages
        - Professional timing and results
        - Expo with local vendors and race sponsors

      drop_bag_notes: |
        Drop bag service available for Half Marathon participants only.

        **Drop Bag Details:**
        - Check bags at Friday expo or race morning (no check after 7:15 AM)
        - Bags transported to mile 8 riverfront aid station
        - Retrieved at finish line after completion
        - Maximum size: standard drawstring bag or small backpack
        - Label clearly with bib number and name
        - No valuables, electronics, or perishables
        - Unclaimed bags held for 30 days then donated

      support_crew_notes: |
        **Spectator/Crew Access Points:**
        - Start/Finish: Downtown Plaza (best viewing and parking)
        - Mile 3: Historic Square (limited parking, public transit access)
        - Mile 8: Riverfront Park (aid station access, food trucks)
        - Mile 11: City Bridge (great photo opportunity)

        **Crew Guidelines:**
        - No crew aid between official aid stations per USATF rules
        - Stay on sidewalks and designated spectator areas
        - Follow volunteer and police directions for safety
        - Cheering encouraged! Your support means everything to runners

      directions_notes: |
        **Event Location:** Downtown Plaza, 123 Main Street

        **Driving Directions:**
        - From North: I-95 South to Exit 42, follow Downtown signs
        - From South: I-95 North to Exit 41, turn left on Main Street
        - From West: Route 50 East directly to downtown area

        **Parking Options:**
        - City Garage A: $5 all day, 2 blocks from start (recommend pre-purchase)
        - City Garage B: $3 all day, 4 blocks from start
        - Street parking: Free on Sundays but limited (arrive by 6:30 AM)
        - Remote lots with shuttle service available ($2, starts at 6:00 AM)

        **Public Transit:** 
        - Metro Blue Line to Downtown Station (1 block walk)
        - Bus routes 15, 23, 42 stop at City Hall (2 blocks)
        - Special race day schedule - check metro website

