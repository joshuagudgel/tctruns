  description: "Join our community of trail runners exploring California's most scenic routes"

  # Call-to-action buttons
  cta_primary: "View All Events"
  cta_secondary: "FAQ"

  # Stats section (keeping "5K+ Runners Served" manageable)
  stats:
    runners_served_number: "5K+"
    runners_served_label: "Runners Served"

